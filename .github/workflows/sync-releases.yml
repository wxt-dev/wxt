name: 🔄 Sync Releases
on:
  workflow_dispatch:
    inputs:
      package:
        description: Package to sync
        default: wxt
        type: choice
        options:
          - analytics
          - auto-icons
          - i18n
          - is-background
          - module-react
          - module-solid
          - module-svelte
          - module-vue
          - runner
          - storage
          - webextension-polyfill
          - wxt

permissions:
  contents: read

jobs:
  sync:
    name: Sync Releases
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup
        uses: ./.github/actions/setup
        with:
          installArgs: --ignore-scripts

      - name: Sync Releases
        run: bun run scripts/sync-releases.ts ${{ inputs.package }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
